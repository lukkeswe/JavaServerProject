<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ノーランド ヨハン ルーカス</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <header>
        <p>Norlund J. Lukas</p>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>
    <body>
        <div class="mainvisual">
            <h1>お問い合わせ</h1>
        </div>
        <div class="content">
            <main>
                <form action="#">
                    <div class="form-txt">
                        <label for="name">お名前<span>必須</span></label>
                        <input type="text" name="name" placeholder="例）山田太郎" required>
                    </div>
                    <div class="form-txt">
                        <label for="mail">メールアドレス<span>必須</span></label>
                        <input type="text" name="mail" placeholder="例）guest@example.com" required>
                    </div>
                    <div class="form-txt">
                        <label for="content">お問い合わせ内容<span>必須</span></label>
                        <textarea name="content" id="content-area" rows="5" placeholder="お問い合わせ内容を入力"></textarea>
                    </div>
                    <button type="submit" id="submit">確認画面へ</button>
                </form>
            </main>
        </div>

    </body>
    <footer>&copy;Norlund J. Lukas</footer>
</html>
