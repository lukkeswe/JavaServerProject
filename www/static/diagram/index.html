<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagram Tool</title>
<style>
  body {margin:0; font-family:Arial; background:#f8f9fa; overflow:hidden;}
  #toolbar {display:flex; align-items:center; gap:8px; background:#fff; padding:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:fixed; top:0; left:0; right:0; z-index:10;}
  #toolbar button {padding:6px 12px; border:1px solid #ccc; background:#fff; cursor:pointer; border-radius:4px;}
  #toolbar button:hover {background:#e9ecef;}
  #toolbar .selected {background: #bcbcbd;}
  #options {display:flex; align-items:center; gap:8px; background:#fff; padding:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:fixed; top:0; right:0; z-index:10;}
  #options button {padding:6px 12px; border:1px solid #ccc; background:#fff; cursor:pointer; border-radius:4px;}
  #options button:hover {background:#e9ecef;}
  canvas {display:block; position:absolute; top:50px; left:0; background-color: #fff;}
</style>
</head>
<body>
<div id="toolbar">
  <button onclick="setTool('select')">🖱️</button>
  <button onclick="setTool('rect')">☐</button>
  <button onclick="setTool('ellipse')">〇</button>
  <button onclick="setTool('diamond')">◇</button>
  <button onclick="setTool('line')">|</button>
  <button onclick="setTool('arrow')">↘</button>
  <button onclick="setTool('text')">T</button>
</div>
<div id="options">
  <button onclick="undo()">↶</button>
  <button onclick="saveCanvas()">💾 Save</button>
  <button onclick="exportCanvas()">⬇️ Export</button>
  <button onclick="loadCanvas()">📂 Load</button>
</div>
<canvas id="canvas"></canvas>
<script>
let shapes = [];
let currentTool = 'select';
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let DPR = window.devicePixelRatio || 1;
let drawing = false;
let startX=0, startY=0;

function resize(){
  canvas.width = window.innerWidth * DPR;
  canvas.height = (window.innerHeight - 50) * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = (window.innerHeight - 50) + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
window.addEventListener('resize', resize);
resize();

function setTool(tool){currentTool=tool;}

canvas.addEventListener('mousedown', e=>{
  const rect = canvas.getBoundingClientRect();
  startX = (e.clientX - rect.left);
  startY = (e.clientY - rect.top);
  if(currentTool==='text'){
    const text = prompt('Enter text:');
    if(text){
      shapes.push({tool:'text', x:startX, y:startY, text:text});
      draw();
    }
    return;
  }
  if(currentTool!=='select') drawing = true;
});

canvas.addEventListener('mousemove', e=>{
  if(!drawing) return;
  draw();
  const rect = canvas.getBoundingClientRect();
  let x = (e.clientX - rect.left);
  let y = (e.clientY - rect.top);
  ctx.strokeStyle='black';
  ctx.lineWidth=2;
  let w = x - startX;
  let h = y - startY;
  if(currentTool==='rect') ctx.strokeRect(startX, startY, w, h);
  else if(currentTool==='ellipse'){ctx.beginPath();ctx.ellipse(startX+w/2,startY+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);ctx.stroke();}
  else if(currentTool==='diamond'){ctx.beginPath();ctx.moveTo(startX+w/2,startY);ctx.lineTo(startX+w,startY+h/2);ctx.lineTo(startX+w/2,startY+h);ctx.lineTo(startX,startY+h/2);ctx.closePath();ctx.stroke();}
  else if(currentTool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}
  else if(currentTool==='arrow'){
    const headlen = 10;
    const angle = Math.atan2(y-startY, x-startX);
    ctx.beginPath();
    ctx.moveTo(startX,startY);
    ctx.lineTo(x,y);
    ctx.lineTo(x-headlen*Math.cos(angle-Math.PI/6),y-headlen*Math.sin(angle-Math.PI/6));
    ctx.moveTo(x,y);
    ctx.lineTo(x-headlen*Math.cos(angle+Math.PI/6),y-headlen*Math.sin(angle+Math.PI/6));
    ctx.stroke();
  }
});

canvas.addEventListener('mouseup', e=>{
  if(!drawing) return;
  drawing=false;
  const rect = canvas.getBoundingClientRect();
  let endX = (e.clientX - rect.left);
  let endY = (e.clientY - rect.top);
  shapes.push({tool:currentTool,startX:startX,startY:startY,endX:endX,endY:endY});
  draw();
});

function draw(){
  ctx.clearRect(0,0,canvas.width/DPR,canvas.height/DPR);
  ctx.font = '16px Arial';
  for(let s of shapes){
    ctx.strokeStyle='black';
    ctx.lineWidth=2;
    if(s.tool==='rect'){
      ctx.strokeRect(s.startX, s.startY, s.endX - s.startX, s.endY - s.startY);
    } else if(s.tool==='ellipse'){
      let w = s.endX - s.startX;
      let h = s.endY - s.startY;
      ctx.beginPath();
      ctx.ellipse(s.startX+w/2,s.startY+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);
      ctx.stroke();
    } else if(s.tool==='diamond'){
      let w = s.endX - s.startX;
      let h = s.endY - s.startY;
      ctx.beginPath();
      ctx.moveTo(s.startX+w/2,s.startY);
      ctx.lineTo(s.startX+w,s.startY+h/2);
      ctx.lineTo(s.startX+w/2,s.startY+h);
      ctx.lineTo(s.startX,s.startY+h/2);
      ctx.closePath();
      ctx.stroke();
    } else if(s.tool==='line'){
      ctx.beginPath();
      ctx.moveTo(s.startX,s.startY);
      ctx.lineTo(s.endX,s.endY);
      ctx.stroke();
    } else if(s.tool==='arrow'){
      const headlen = 10;
      const angle = Math.atan2(s.endY-s.startY, s.endX-s.startX);
      ctx.beginPath();
      ctx.moveTo(s.startX,s.startY);
      ctx.lineTo(s.endX,s.endY);
      ctx.lineTo(s.endX-headlen*Math.cos(angle-Math.PI/6),s.endY-headlen*Math.sin(angle-Math.PI/6));
      ctx.moveTo(s.endX, s.endY);
      ctx.lineTo(s.endX-headlen*Math.cos(angle+Math.PI/6),s.endY-headlen*Math.sin(angle+Math.PI/6));
      ctx.stroke();
    } else if(s.tool==='text'){
      ctx.fillStyle='black';
      ctx.fillText(s.text, s.x, s.y);
    }
  }
}

function undo(){
  shapes.pop();
  draw();
}

function saveCanvas(){
  localStorage.setItem('diagramShapes', JSON.stringify(shapes));
}

function exportCanvas(){
  const link=document.createElement('a');
  link.download='diagram.png';
  link.href=canvas.toDataURL();
  link.click();
}

function loadCanvas(){
  let saved = localStorage.getItem('diagramShapes');
  if(saved){shapes=JSON.parse(saved);draw();}
}

const toolbaren = document.getElementById("toolbar");
Array.from(toolbaren.children).forEach(child=>child.addEventListener("click", () => {
  highlightButton(child);
}));

function highlightButton(element){
  const toolbar = document.getElementById('toolbar');
  Array.from(toolbar.children).forEach(child=>child.classList.remove('selected'));
  if(element) element.classList.add('selected');
}
</script>
</body>
</html>
